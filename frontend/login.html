<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lost2Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <header>
        <a href="index.html" class="brand">LOST2FOUND</a>
        <button class="hamburger" id="hamburger-menu">☰</button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="view-items.html">View Items</a></li>
            <li><a href="login.html" class="active">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <h2>Welcome Back</h2>

            <div id="auth-message" class="message-box"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@college.edu">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label>Security Check</label>
                    <div class="captcha-container">
                        <span id="captcha-question">Generating...</span>
                        <button type="button" class="btn-refresh" id="refresh-captcha" title="New Question">↻</button>
                    </div>
                    <input type="number" id="captcha-answer" class="form-control" required placeholder="Enter the sum">
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Log In</button>

                <div class="auth-links">
                    Don't have an account? <a href="register.html">Register here</a>
                    <br><br>
                    <a href="admin-login.html">Admin Portal</a>
                </div>
            </form>
        </div>
    </main>

        <footer>
        <p>Lost 2 found developed by NLR GROUP OF COMPANY</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/captcha.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('hamburger-menu').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('show');
        });
    </script>
</body>

</html>
