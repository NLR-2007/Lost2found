<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lost2Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <header>
        <a href="index.html" class="brand">L2F ADMIN</a>
        <button class="hamburger" id="hamburger-menu">☰</button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">User Login</a></li>
        </ul>
    </header>

    <main class="auth-page">
        <div class="auth-card admin-auth-card">
            <h2>Admin Portal</h2>

            <div id="auth-message" class="message-box"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="admin@l2f.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="form-group" id="otp-group" style="display: none;">
                    <label for="otp">Admin OTP (Sent to Telegram)</label>
                    <input type="text" id="otp" class="form-control" placeholder="123456" maxlength="6">
                </div>

                <button type="submit" id="admin-submit-btn" class="btn btn-danger auth-btn">Secure Login</button>
            </form>
        </div>
    </main>

        <footer>
        <p>Lost 2 found developed by NLR GROUP OF COMPANY</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('hamburger-menu').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('show');
        });
    </script>
</body>

</html>
